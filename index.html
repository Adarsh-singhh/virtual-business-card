<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Business Card</title>

    <link rel="stylesheet" href="style.css">


    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">


    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="container">

    <div class="card">

        <img src="profile.jpg" alt="Profile Photo" class="profile">

        <h1>Adarsh Singh</h1>
        <h3>Frontend Web Developer</h3>

        <p class="bio">
            Passionate web developer creating modern, responsive and user-friendly websites.
        </p>

        <div class="contact">
            <p><i class="fas fa-envelope"></i> yourname@email.com</p>
            <p><i class="fas fa-phone"></i> +91 9876543210</p>
        </div>

        <div class="socials">

            <a href="https://github.com/" target="_blank">
                <i class="fab fa-github"></i>
            </a>

            <a href="https://linkedin.com/" target="_blank">
                <i class="fab fa-linkedin"></i>
            </a>

            <a href="https://instagram.com/" target="_blank">
                <i class="fab fa-instagram"></i>
            </a>

            <a href="mailto:yourname@email.com">
                <i class="fas fa-envelope"></i>
            </a>

        </div>

        <button id="copyBtn">Copy Email</button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
